version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development
    ignore:
      # next typegen rejects TypeScript majors it does not support yet;
      # lift this once Next.js accepts TypeScript >= 7.
      - dependency-name: typescript
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
